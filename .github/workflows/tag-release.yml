name: Tag & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Check if tag exists
        id: check-tag
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} will be created"
          fi

      - name: Get latest commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create git tag via API
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ steps.version.outputs.tag }}',
                message: 'Release ${{ steps.version.outputs.tag }}',
                object: '${{ steps.sha.outputs.sha }}',
                type: 'commit'
              });
              console.log('Tag ${{ steps.version.outputs.tag }} created');
            } catch (e) {
              if (e.status === 422) {
                console.log('Tag already exists, skipping');
              } else {
                throw e;
              }
            }

      - name: Push tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git push origin refs/tags/${{ steps.version.outputs.tag }}
          echo "✅ Tag ${{ steps.version.outputs.tag }} pushed"

      - name: Generate release notes
        id: release-notes
        run: |
          NOTES="## v${{ steps.version.outputs.version }} 更新

### 截图功能
- 新增 screenshot_tool.py: Playwright + URL 验证 + 智能选择器
- 新增 share_card.py: 9 平台分享卡片批量生成
- 统一替换 shot-scraper → Playwright

### 工作流优化
- Share Card 进入 orchestrator 正式 pipeline
- Review 新增图片数量校验规则
- Verify URL 缓存共享 (TTL 1h)

### 其他
- 依赖更新: playwright + requests
- GitHub Actions 自动 tag + release"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: '${{ steps.version.outputs.tag }}',
                name: '${{ steps.version.outputs.tag }}',
                body: `\${{ steps.release-notes.outputs.notes }}`,
                draft: false,
                prerelease: false
              });
              console.log('Release ${{ steps.version.outputs.tag }} created');
            } catch (e) {
              if (e.status === 409) {
                console.log('Release already exists, skipping');
              } else {
                throw e;
              }
            }
