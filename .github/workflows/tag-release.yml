name: Tag & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Check release exists
        id: check-release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "skipping=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "skipping=false" >> "$GITHUB_OUTPUT"
            echo "Will create release v${{ steps.version.outputs.version }}"
          fi

      - name: Bump version
        if: steps.check-release.outputs.skipping == 'false'
        id: bump-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping from $VERSION to $NEW_VERSION"
          # 更新 plugin.json 版本号
          sed -i "s/\"version\": \"$VERSION\"/\"version\": \"$NEW_VERSION\"/" .claude-plugin/plugin.json
          sed -i "s/v$VERSION/v$NEW_VERSION/" .claude-plugin/plugin.json
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Get SHA
        if: steps.check-release.outputs.skipping == 'false'
        id: sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag via API
        if: steps.check-release.outputs.skipping == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ steps.bump-version.outputs.tag }}';
            try {
              await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
                message: 'Release ' + tag,
                object: '${{ steps.sha.outputs.sha }}',
                type: 'commit'
              });
              console.log('Tag created: ' + tag);
            } catch (e) {
              if (e.status !== 422) throw e;
              console.log('Tag already exists, skipping');
            }

      - name: Create tag ref via API
        if: steps.check-release.outputs.skipping == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ steps.bump-version.outputs.tag }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/' + tag,
                sha: '${{ steps.sha.outputs.sha }}'
              });
              console.log('Tag ref created: ' + tag);
            } catch (e) {
              if (e.status !== 422) throw e;
              console.log('Tag ref already exists, skipping');
            }

      - name: Commit and push version bump
        if: steps.check-release.outputs.skipping == 'false' && steps.bump-version.outputs.new_version
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.bump-version.outputs.new_version }}"
          git push origin main

      - name: Create GitHub Release
        if: steps.check-release.outputs.skipping == 'false'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.bump-version.outputs.tag }}
          name: ${{ steps.bump-version.outputs.tag }}
          body: |
            ## v${{ steps.bump-version.outputs.new_version }} 更新

            See CHANGELOG for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}