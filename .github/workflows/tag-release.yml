name: Tag & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Force Node.js 24 for all actions (Node.js 20 deprecated)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Check release exists
        id: check-release
        run: |
          # 通过 API 检查 release 是否存在
          if gh release view v${{ steps.version.outputs.version }} --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will create release v${{ steps.version.outputs.version }}"
          fi

      - name: Get SHA
        id: sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag via API
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ steps.version.outputs.tag }}',
                message: 'Release ${{ steps.version.outputs.tag }}',
                object: '${{ steps.sha.outputs.sha }}',
                type: 'commit'
              });
              console.log('Tag created');
            } catch (e) {
              if (e.status !== 422) throw e;
              console.log('Tag already exists, skipping');
            }
        # Opt into Node.js 24 for this action
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Create tag ref via API
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/${{ steps.version.outputs.tag }}',
                sha: '${{ steps.sha.outputs.sha }}'
              });
              console.log('Tag ref created');
            } catch (e) {
              if (e.status !== 422) throw e;
              console.log('Tag ref already exists, skipping');
            }
        # Opt into Node.js 24 for this action
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## v${{ steps.version.outputs.version }} 更新

            ### 截图功能
            - screenshot_tool.py: Playwright + URL 验证 + 智能选择器
            - share_card.py: 9 平台分享卡片批量生成
            - 统一替换 shot-scraper -> Playwright

            ### 工作流优化
            - Share Card 进入 orchestrator 正式 pipeline
            - Review 新增图片数量校验规则
            - Verify URL 缓存共享 (TTL 1h)

            ### 其他
            - 依赖更新: playwright + requests
            - GitHub Actions 自动 tag + release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
