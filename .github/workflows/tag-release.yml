name: Tag & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Check release exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "skipping=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists — skipping (idempotent no-op)"
          else
            echo "skipping=false" >> "$GITHUB_OUTPUT"
            echo "Will create release v${{ steps.version.outputs.version }}"
          fi

      # NOTE: No auto-bump. plugin.json is the source of truth for the release
      # version. If you push to main without bumping plugin.json and the release
      # already exists, this workflow is a clean no-op (see check-release above).
      # To cut a new release, bump `.claude-plugin/plugin.json` first, update
      # all SKILL.md and marketplace.json in the same commit, then push.

      - name: Get SHA
        if: steps.check-release.outputs.skipping == 'false'
        id: sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag ref via API
        if: steps.check-release.outputs.skipping == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/' + tag,
                sha: '${{ steps.sha.outputs.sha }}'
              });
              console.log('Tag ref created: ' + tag);
            } catch (e) {
              if (e.status !== 422) throw e;
              console.log('Tag ref already exists, skipping');
            }

      - name: Create GitHub Release
        if: steps.check-release.outputs.skipping == 'false'
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## v${{ steps.version.outputs.version }}

            See CHANGELOG.md for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}